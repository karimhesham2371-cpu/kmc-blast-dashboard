<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMCashOffers — Blast Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sidebar:#161b22;--card:#1c2333;--card2:#21262d;
  --border:rgba(255,255,255,0.08);--green:#22c55e;--green-dim:rgba(34,197,94,0.15);
  --red:#ef4444;--yellow:#f59e0b;--blue:#58a6ff;
  --text:#e2e8f0;--muted:#8b949e;--font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
input,textarea,select,button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ── Login ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center}
.login-logo{width:56px;height:56px;background:var(--green);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#000;margin:0 auto 20px}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:6px}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:28px}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;transition:border .2s}
.login-box input:focus{border-color:var(--green)}
.login-box button{width:100%;background:var(--green);color:#000;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.login-box button:hover{background:#16a34a}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-badge{background:var(--green);color:#000;font-size:11px;font-weight:900;padding:4px 8px;border-radius:6px;letter-spacing:.05em}
.brand-name{font-size:15px;font-weight:700;color:var(--text)}
.sidebar-nav{padding:10px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--green-dim);color:var(--green);font-weight:600}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{background:var(--green);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-left:auto}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}

/* ── Main ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.view{flex:1;padding:28px 32px;display:none;flex-direction:column;gap:24px}
.view.active{display:flex}
.view-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.view-title{font-size:22px;font-weight:700}
.view-sub{color:var(--muted);font-size:14px;margin-top:2px}

/* ── Cards / Grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:700;line-height:1}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.yellow{color:var(--yellow)}
.stat-value.blue{color:var(--blue)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-primary{background:var(--green);color:#000;border-color:var(--green)}
.btn-primary:hover{background:#16a34a}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-yellow{background:transparent;color:var(--yellow);border-color:rgba(245,158,11,.3)}
.btn-yellow:hover{background:rgba(245,158,11,.1)}
.btn-blue{background:rgba(88,166,255,.1);color:var(--blue);border-color:rgba(88,166,255,.25)}
.btn-blue:hover{background:rgba(88,166,255,.2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}

/* ── Table ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* ── Status badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red)}
.badge-yellow{background:rgba(245,158,11,.12);color:var(--yellow)}
.badge-blue{background:rgba(88,166,255,.12);color:var(--blue)}
.badge-gray{background:rgba(139,148,158,.12);color:var(--muted)}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── Progress bar ── */
.progress-wrap{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;min-width:80px}
.progress-bar{height:100%;background:var(--green);border-radius:4px;transition:width .3s}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:24px}
.form-row{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--green)}
textarea.form-input{resize:vertical;min-height:100px;font-family:inherit}
.form-hint{font-size:12px;color:var(--muted);margin-top:5px}
.modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}

/* ── Campaign detail ── */
.camp-detail{display:flex;flex-direction:column;gap:20px}
.camp-stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.camp-stat{background:var(--card2);border-radius:10px;padding:14px 16px;text-align:center}
.camp-stat-val{font-size:24px;font-weight:700}
.camp-stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.camp-actions{display:flex;gap:10px;flex-wrap:wrap}
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.detail-section-title{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.edit-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-form .full{grid-column:1/-1}

/* ── Inbox ── */
.inbox-layout{display:flex;flex:1;overflow:hidden;background:var(--card);border:1px solid var(--border);border-radius:12px;min-height:0}
.conv-list{width:300px;min-width:300px;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.conv-search{padding:12px;border-bottom:1px solid var(--border)}
.conv-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.conv-search input:focus{border-color:var(--green)}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.conv-item:hover{background:var(--card2)}
.conv-item.active{background:var(--green-dim);border-left:3px solid var(--green)}
.conv-phone{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.conv-preview{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.conv-time{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.conv-empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.thread-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.thread-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.thread-phone{font-size:16px;font-weight:700}
.thread-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.thread-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
.msg{max-width:72%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-out{background:var(--green-dim);border:1px solid rgba(34,197,94,.2);align-self:flex-end;border-bottom-right-radius:4px}
.msg-in{background:var(--card2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-time{font-size:11px;color:var(--muted);margin-top:4px}
.msg-from{font-size:11px;color:var(--muted);margin-bottom:4px}
.reply-bar{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.reply-bar select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
.reply-bar textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:14px;outline:none;resize:none;max-height:100px;min-height:42px;transition:border .2s;font-family:inherit}
.reply-bar textarea:focus{border-color:var(--green)}

/* ── Opt-outs ── */
.optout-top{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.optout-top input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:14px;outline:none;min-width:200px}
.optout-top input:focus{border-color:var(--green)}

/* ── Send view ── */
.send-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:560px}
.char-count{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}

/* ── Upload drop zone ── */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--green);background:var(--green-dim)}
.upload-zone input{display:none}

/* ── Inbox filter pills ── */
.inbox-filters{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-pill{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.filter-pill:hover{background:var(--card2);color:var(--text)}
.filter-pill.active{background:var(--green-dim);color:var(--green);border-color:rgba(34,197,94,.35)}
.filter-pill.pill-yes.active{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.4)}
.filter-pill.pill-no.active{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}
.filter-pill.pill-unread.active{background:rgba(88,166,255,.12);color:var(--blue);border-color:rgba(88,166,255,.3)}
.conv-item.unread .conv-phone{font-weight:700;color:var(--text)}
.conv-item.unread::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue);position:absolute;left:6px;top:50%;transform:translateY(-50%)}
.conv-item{position:relative;padding-left:20px}

/* ── Context menu ── */
#ctx-menu{position:fixed;z-index:8000;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:210px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
#ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:background .1s}
.ctx-item:hover{background:var(--card)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(239,68,68,.1)}
.ctx-item.green{color:var(--green)}
.ctx-item.green:hover{background:var(--green-dim)}
.ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* ── Misc ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);cursor:pointer;margin-bottom:12px}
.back-btn:hover{color:var(--text)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{margin-bottom:14px;opacity:.3}
.empty-state p{font-size:15px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:14px;z-index:9000;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">KMC</div>
    <h2>Blast Dashboard</h2>
    <p>KMCashOffers SMS Command Center</p>
    <input type="password" id="pass-input" placeholder="Access password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Enter Dashboard</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="login-logo" style="width:32px;height:32px;font-size:12px;margin:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center">KMC</span>
      <span class="brand-name">Blast HQ</span>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="nav('overview')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="nav-item" onclick="nav('campaigns')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Campaigns
      </button>
      <button class="nav-item" onclick="nav('inbox')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Inbox
        <span class="nav-badge" id="inbox-badge" style="display:none"></span>
      </button>
      <button class="nav-item" onclick="nav('optouts')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        Opt-Outs
      </button>
      <button class="nav-item" onclick="nav('send')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Manual Send
      </button>
    </div>
    <div class="sidebar-footer">KMCashOffers · 5 numbers</div>
  </nav>

  <main class="main">
    <div id="view-overview" class="view active"></div>
    <div id="view-campaigns" class="view"></div>
    <div id="view-inbox" class="view" style="padding:0;overflow:hidden"></div>
    <div id="view-optouts" class="view"></div>
    <div id="view-send" class="view"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- Right-click context menu -->
<div id="ctx-menu">
  <button class="ctx-item" id="ctx-copy-msg">📋 Copy message</button>
  <button class="ctx-item" id="ctx-copy-phone">📞 Copy phone number</button>
  <div class="ctx-divider"></div>
  <button class="ctx-item green" id="ctx-mark-yes">✅ Mark as YES</button>
  <button class="ctx-item" id="ctx-mark-no" style="color:var(--red)">❌ Mark as NO</button>
  <button class="ctx-item" id="ctx-mark-other">○ Mark as Other</button>
  <div class="ctx-divider"></div>
  <button class="ctx-item" id="ctx-reply-now">↗ Quick Reply</button>
  <button class="ctx-item" id="ctx-open-send">✉️ Open in Manual Send</button>
  <div class="ctx-divider"></div>
  <button class="ctx-item danger" id="ctx-block">🚫 Block this number</button>
  <button class="ctx-item danger" id="ctx-delete-msg">🗑 Delete message</button>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let TOKEN = '';
let currentView = 'overview';
let inboxData = [];
let activeConv = null;
let inboxSearch = '';
let inboxFilter = 'all'; // all | yes | no | unread
let inboxRefreshTimer = null;
let inboxReadTs = {}; // phone → timestamp of last time we opened that conv
let inboxDays = 7; // date-range filter sent to /api/inbox: 1 | 7 | 30 | 0(=all time)
const KMC_NUMBERS = ['+12109856004','+17869499467','+14709320125','+19163474799','+13126752435'];
const KMC_LABELS  = {
  '+12109856004': 'San Antonio TX',
  '+17869499467': 'Miami FL',
  '+14709320125': 'Atlanta GA',
  '+19163474799': 'Sacramento CA',
  '+13126752435': 'Chicago IL',
};

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pass = document.getElementById('pass-input').value;
  if (!pass) return;
  try {
    const r = await fetch('/api/stats', { headers: { 'x-dash-token': pass } });
    if (r.status === 401) { document.getElementById('login-err').textContent = 'Wrong password.'; return; }
    TOKEN = pass;
    localStorage.setItem('kmc_token', pass);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display   = 'flex';
    init();
  } catch(e) { document.getElementById('login-err').textContent = 'Connection error.'; }
}

async function tryAutoLogin() {
  const saved = localStorage.getItem('kmc_token');
  if (!saved) return;
  try {
    const r = await fetch('/api/stats', { headers: { 'x-dash-token': saved } });
    if (r.ok) {
      TOKEN = saved;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display   = 'flex';
      init();
    }
  } catch{}
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const isFormData = opts.body instanceof FormData;
  const headers = isFormData
    ? { 'x-dash-token': TOKEN, ...(opts.headers || {}) }
    : { 'x-dash-token': TOKEN, 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const res = await fetch(path, {
    ...opts,
    headers,
    body: !isFormData && opts.body && typeof opts.body === 'object' ? JSON.stringify(opts.body) : opts.body,
  });
  if (res.status === 401) { localStorage.removeItem('kmc_token'); location.reload(); }
  return res;
}

async function apiJ(path, opts) { const r = await api(path, opts); return r.json(); }

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(view) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const btn = [...document.querySelectorAll('.nav-item')].find(el => el.getAttribute('onclick')?.includes(`'${view}'`));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  currentView = view;
  if (inboxRefreshTimer) { clearInterval(inboxRefreshTimer); inboxRefreshTimer = null; }
  if (view === 'overview')   renderOverview();
  if (view === 'campaigns')  renderCampaigns();
  if (view === 'inbox')      { renderInbox(); inboxRefreshTimer = setInterval(refreshInbox, 10000); }
  if (view === 'optouts')    renderOptOuts();
  if (view === 'send')       renderSend();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const diff = now - d;
  if (diff < 60000)   return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000)return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtTs(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
}
function statusBadge(s) {
  const map = { active:'green', draft:'gray', paused:'yellow', completed:'blue', pending:'gray', sent:'green', failed:'red', opted_out:'red', yes:'green', no:'red', other:'gray' };
  return `<span class="badge badge-${map[s]||'gray'}">${s}</span>`;
}
function pct(a, b) { return b > 0 ? Math.round(a/b*100) : 0; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadContacts(id) {

  el.innerHTML = '<div class="loader"></div>';
  const contacts = await apiJ(`/api/campaigns/${id}/contacts?limit=100${status ? '&status='+status : ''}`);
  if (!contacts.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0">No contacts found.</div>'; return; }
  el.innerHTML = `<table><thead><tr><th>Phone</th><th>Name</th><th>Address</th><th>Status</th><th>Sent At</th><th>From</th></tr></thead><tbody>${
    contacts.map(c => `<tr>
      <td style="font-weight:600">${esc(c.phone)}</td>
      <td>${esc(c.first_name)||'—'}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.address)||'—'}</td>
      <td>${statusBadge(c.status)}</td>
      <td style="font-size:12px;color:var(--muted)">${c.sent_at ? fmtTs(c.sent_at) : '—'}</td>
      <td style="font-size:12px;color:var(--muted)">${c.assigned_from ? KMC_LABELS[c.assigned_from]||c.assigned_from : '—'}</td>

  }</tbody></table><div style="font-size:12px;color:var(--muted);padding:12px 0">Showing first 100. Use the filter to narrow down.</div>`;

async function saveEdit(id) {
  const name    = document.getElementById('edit-name').value.trim();
  const limit   = parseInt(document.getElementById('edit-limit').value) || 200;
  const msg     = document.getElementById('edit-msg').value.trim();
  const msg2    = document.getElementById('edit-msg2').value.trim();
  const msg3    = document.getElementById('edit-msg3').value.trim();
  const arEn    = document.getElementById('edit-autoreply-en').checked;
  const arMsg   = document.getElementById('edit-autoreply-msg').value.trim();
  const quietEn = document.getElementById('edit-quiet-en').checked;
  if (!name || !msg) { toast('Name and message required', 'error'); return; }
  await apiJ(`/api/campaigns/${id}`, { method:'PATCH', body: {
    name, daily_limit: limit, message: msg, message_2: msg2 || null, message_3: msg3 || null,
    auto_reply_enabled: arEn, auto_reply_message: arMsg || null, quiet_hours_enabled: quietEn,
  }});
  toast('Saved ✓');
  renderCampDetail(id);
}

async function testSend(id, variant) {
  const to = document.getElementById('test-phone').value.trim();
  if (!to) { toast('Enter your phone number first', 'error'); return; }
  const r = await apiJ(`/api/campaigns/${id}/test-send`, { method:'POST', body: { to, variant } });
  if (r.error) { toast(r.error, 'error'); return; }
  toast(r.ok ? 'Test message sent ✓' : 'Send failed');
}

let pendingUploadFile = null;

async function uploadCSV(id) {
  const file = document.getElementById('csv-input').files[0];
  if (!file) return;
  pendingUploadFile = file;
  document.getElementById('upload-zone').innerHTML = '<div class="loader"></div>';
  const fd = new FormData(); fd.append('file', file);
  const r = await (await api(`/api/campaigns/${id}/upload-preview`, { method:'POST', headers: { 'x-dash-token': TOKEN }, body: fd })).json();
  if (r.error) { toast(r.error, 'error'); renderCampDetail(id); return; }
  showMappingPreview(id, r);
}

function colOption(headers, selectedIdx, label) {
  return `<option value="-1" ${selectedIdx<0?'selected':''}>— None —</option>` +
    headers.map((h,i) => `<option value="${i}" ${i===selectedIdx?'selected':''}>${esc(h||'(column '+(i+1)+')')}</option>`).join('');
}

function showMappingPreview(id, r) {
  const { headers, map, sampleRows, totalRows } = r;
  const fieldRow = (fieldId, label, required, selectedIdx) => `
    <div class="form-row">
      <label class="form-label">${label}${required?' <span style="color:var(--red)">*</span>':''}</label>
      <select class="form-input" id="${fieldId}">${colOption(headers, selectedIdx, label)}</select>
    </div>`;

  const preview = sampleRows.slice(0,3).map(row => `<tr>${headers.map((h,i)=>`<td style="font-size:12px;padding:4px 8px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis">${esc(row[i]||'')}</td>`).join('')}</tr>`).join('');

  const html = `<div class="modal-overlay" id="map-modal" onclick="if(event.target===this)closeMappingPreview()">
    <div class="modal" style="max-width:640px">
      <div class="modal-title">Confirm Column Mapping</div>
      <div class="form-hint" style="margin-bottom:14px">${totalRows} row(s) detected. We auto-matched these columns — double check (especially Phone, First Name, Address) and fix any that look wrong before importing.</div>
      ${fieldRow('map-phone','Phone Number',true,map.phoneIdx)}
      ${fieldRow('map-name','First Name',false,map.nameIdx)}
      ${fieldRow('map-addr','Address',false,map.addrIdx)}
      ${fieldRow('map-city','City',false,map.cityIdx)}
      ${fieldRow('map-state','State',false,map.stIdx)}
      ${fieldRow('map-zip','Zip',false,map.zipIdx)}
      <div style="overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-top:10px">
        <table style="width:100%;border-collapse:collapse"><thead><tr>${headers.map(h=>`<th style="font-size:11px;color:var(--muted);padding:6px 8px;text-align:left;white-space:nowrap">${esc(h)}</th>`).join('')}</tr></thead><tbody>${preview}</tbody></table>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeMappingPreview()">Cancel</button><button class="btn btn-primary" onclick="confirmUpload(${id})">✓ Looks Good — Import</button></div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeMappingPreview() {
  document.getElementById('map-modal')?.remove();
  pendingUploadFile = null;
  if (campDetail) renderCampDetail(campDetail); // regenerates the upload zone (its file input was destroyed by the loader swap)
}

async function confirmUpload(id) {
  if (!pendingUploadFile) return;
  const phoneCol = document.getElementById('map-phone').value;
  if (phoneCol === '-1') { toast('Phone column is required', 'error'); return; }
  const fd = new FormData();
  fd.append('file', pendingUploadFile);
  fd.append('phoneCol', phoneCol);
  fd.append('nameCol',  document.getElementById('map-name').value);
  fd.append('addrCol',  document.getElementById('map-addr').value);
  fd.append('cityCol',  document.getElementById('map-city').value);
  fd.append('stateCol', document.getElementById('map-state').value);
  fd.append('zipCol',   document.getElementById('map-zip').value);
  document.getElementById('map-modal')?.remove();
  document.getElementById('upload-zone').innerHTML = '<div class="loader"></div>';

  const r = await (await api(`/api/campaigns/${id}/upload`, { method:'POST', headers: { 'x-dash-token': TOKEN }, body: fd })).json();
  pendingUploadFile = null;
  if (r.error) { toast(r.error, 'error'); renderCampDetail(id); return; }
  toast(`✅ ${r.inserted} added · ${r.dupes} dupes · ${r.blocked} opt-outs · ${r.crossCampaign||0} already texted elsewhere · ${r.invalid} invalid — total: ${r.total_in_campaign}`);
  renderCampDetail(id);
}

async function blastNow(id) {
  const btn = document.getElementById('blast-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Sending...'; }
  const r = await apiJ(`/api/campaigns/${id}/blast`, { method:'POST' });
  if (r.error) { toast(r.error, 'error'); if (btn) { btn.disabled = false; btn.innerHTML = '⚡ Blast Now'; } return; }
  toast(r.queued > 0 ? `⚡ Queued ${r.queued} messages!` : r.message || 'Nothing to send');
  setTimeout(() => renderCampDetail(id), 2000);
}

async function activateCamp(id, refresh) {
  const r = await apiJ(`/api/campaigns/${id}/activate`, { method:'POST' });
  if (r.error) { toast(r.error, 'error'); return; }
  toast('Campaign activated ✓');
  if (refresh) renderCampDetail(id); else renderCampaigns();
}

async function pauseCamp(id, refresh) {
  await apiJ(`/api/campaigns/${id}/pause`, { method:'POST' });
  toast('Campaign paused');
  if (refresh) renderCampDetail(id); else renderCampaigns();
}

async function deleteCamp(id, name) {
  if (!confirm(`Delete campaign "${name}"? This also removes all contacts.`)) return;
  await apiJ(`/api/campaigns/${id}`, { method:'DELETE' });
  toast('Deleted');
  campDetail = null;
  renderCampaigns();
}

      <div class="form-row"><label class="form-label">First Message — Variant 3 <span style="color:var(--muted);font-weight:400">(optional)</span></label><textarea class="form-input" id="new-msg3" rows="3" placeholder="Leave blank to skip this variant"></textarea></div>
      <div class="form-hint" style="margin-top:-8px;margin-bottom:14px">Use {name} / {address} as placeholders. Contacts are rotated round-robin across whichever variants you fill in — this avoids spam-filter pattern detection from sending the exact same text to everyone.</div>

    </div>

  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.getElementById('create-modal')?.remove(); }

async function createCamp() {
  const name    = document.getElementById('new-name').value.trim();
  const limit   = parseInt(document.getElementById('new-limit').value) || 200;
  const msg     = document.getElementById('new-msg').value.trim();
  const msg2    = document.getElementById('new-msg2').value.trim();
  const msg3    = document.getElementById('new-msg3').value.trim();
  const arEn    = document.getElementById('new-autoreply-en').checked;
  const arMsg   = document.getElementById('new-autoreply-msg').value.trim();
  const quietEn = document.getElementById('new-quiet-en').checked;
  if (!name || !msg) { toast('Name and at least one message variant required', 'error'); return; }
  const r = await apiJ('/api/campaigns', { method:'POST', body: {
    name, daily_limit: limit, message: msg, message_2: msg2 || null, message_3: msg3 || null,
    auto_reply_enabled: arEn, auto_reply_message: arMsg || null, quiet_hours_enabled: quietEn,
  }});
  if (r.error) { toast(r.error, 'error'); return; }
  closeModal();
  toast('Campaign created ✓');
  campDetail = null;
  renderCampaigns();
}

function setInboxFilter(f) {
  inboxFilter = f;
  document.querySelectorAll('#inbox-filters .filter-pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById('pill-' + f);
  if (pill) pill.classList.add('active');

}

function setInboxDays(days) {
  inboxDays = days;
  document.querySelectorAll('#inbox-date-filters .filter-pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById('pill-days-' + days);
  if (pill) pill.classList.add('active');

}

// Reset every Inbox filter (reply-type pill, date range, search box) back to
// defaults and force a fresh fetch — a one-click substitute for the hard
// refresh some stale filter combinations previously required.
function clearInboxFilters() {
  inboxFilter = 'all';
  inboxDays = 7;
  inboxSearch = '';
  document.querySelectorAll('#inbox-filters .filter-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-all')?.classList.add('active');
  document.querySelectorAll('#inbox-date-filters .filter-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-days-7')?.classList.add('active');
  const searchInput = document.getElementById('inbox-search-input');
  if (searchInput) searchInput.value = '';
  refreshInbox();
}

async function refreshInbox() {
  const list = document.getElementById('conv-list-items');
  if (list && !inboxData.length) list.innerHTML = '<div style="padding:40px;text-align:center"><div class="loader"></div></div>';
  inboxData = await apiJ(`/api/inbox?days=${inboxDays}`);

  // A conversation is Unread if EITHER half of "we haven't dealt with this
  // reply yet" is true: we haven't replied back since their last inbound
  // message (last message in the thread is still inbound), OR we haven't
  // actually viewed it yet (an inbound message arrived after our last-viewed
  // timestamp — this also catches the case where an auto-reply fired
  // automatically right after their message, so the thread's last message
  // is outbound even though a human never looked at the inbound one).
  const savedTs = JSON.parse(localStorage.getItem('kmc_read_ts') || '{}');
  inboxReadTs = savedTs;
  inboxData.forEach(c => { c.isUnread = computeIsUnread(c); });

  // Counts for pill labels
  const unreadCount = inboxData.filter(c => c.isUnread).length;
  const yesCount    = inboxData.filter(c => c.replyType === 'yes').length;
  const noCount     = inboxData.filter(c => c.replyType === 'no').length;
  const otherCount  = inboxData.filter(c => c.hasReplied && c.replyType === 'other').length;

  const badge = document.getElementById('inbox-badge');
  if (badge) { badge.textContent = unreadCount || inboxData.length; badge.style.display = inboxData.length > 0 ? '' : 'none'; }

  const pillUnread = document.getElementById('pill-unread');
  const pillYes    = document.getElementById('pill-yes');
  const pillNo     = document.getElementById('pill-no');
  const pillOther  = document.getElementById('pill-other');
  const pillAll    = document.getElementById('pill-all');
  if (pillAll)    pillAll.textContent    = `All (${inboxData.length})`;
  if (pillUnread) pillUnread.textContent = `🔵 Unread (${unreadCount})`;
  if (pillYes)    pillYes.textContent    = `✅ Interested (${yesCount})`;
  if (pillNo)     pillNo.textContent     = `❌ Objections (${noCount})`;
  if (pillOther)  pillOther.textContent  = `💬 Others (${otherCount})`;

  renderConvList();
}

function filterConvs(q) { inboxSearch = q.toLowerCase(); renderConvList(); }

function computeIsUnread(c) {
  const lastRead = inboxReadTs[c.phone] || 0;
  // Unread = there's an inbound message we haven't viewed yet (arrived after
  // our last-viewed timestamp for this phone). Checking ALL messages, not
  // just the last one, is what correctly catches the case where an
  // auto-reply fires immediately after an inbound "yes" — the thread's last
  // message becomes outbound, but the inbound one before it is still
  // unviewed. Once you open the conversation, lastRead updates and this
  // clears for good until a genuinely new inbound message arrives.
  return c.messages.some(msg => msg.dir === 'in' && new Date(msg.ts) > new Date(lastRead));
}

function renderConvList() {
  const el = document.getElementById('conv-list-items');
  if (!el) return;

  let list = inboxData;

  // Apply active filter
  if (inboxFilter === 'yes')        list = list.filter(c => c.replyType === 'yes');
  else if (inboxFilter === 'no')    list = list.filter(c => c.replyType === 'no');
  else if (inboxFilter === 'other') list = list.filter(c => c.hasReplied && c.replyType === 'other');
  else if (inboxFilter === 'unread') list = list.filter(c => c.isUnread);

  // Apply search
  if (inboxSearch) list = list.filter(c =>
    c.phone.includes(inboxSearch) || c.preview.toLowerCase().includes(inboxSearch)
  );

  if (!list.length) { el.innerHTML = '<div class="conv-empty">No conversations found</div>'; return; }

  el.innerHTML = list.map(c => {
    const typeClass  = c.replyType === 'yes' ? 'badge-green' : c.replyType === 'no' ? 'badge-red' : 'badge-gray';
    const unreadCls  = c.isUnread ? ' unread' : '';
    return `<div class="conv-item${activeConv===c.phone?' active':''}${unreadCls}" onclick="openConv('${c.phone}')">
      <div class="conv-phone">
        ${c.name ? `<strong>${esc(c.name)}</strong> <span style="color:var(--muted);font-weight:400">${esc(c.phone)}</span>` : esc(c.phone)}
        ${c.hasReplied ? `<span class="badge ${typeClass}" style="font-size:10px;padding:2px 6px">${c.replyType||'reply'}</span>` : ''}
        ${c.isUnread ? `<span style="font-size:10px;color:var(--blue);font-weight:700;margin-left:2px">NEW</span>` : ''}
        <span class="conv-time">${fmtTime(c.lastActivity)}</span>
      </div>
      <div class="conv-preview" style="${c.isUnread?'color:var(--text);font-weight:500':''}">${esc(c.preview)}</div>
    </div>`;
  }).join('');
}

function openConv(phone) {
  activeConv = phone;
  // Mark as read — save timestamp to localStorage
  inboxReadTs[phone] = new Date().toISOString();
  localStorage.setItem('kmc_read_ts', JSON.stringify(inboxReadTs));
  // Update isUnread flag and re-render list
  const conv = inboxData.find(c => c.phone === phone);
  if (conv) conv.isUnread = false;
  renderConvList();
  if (!conv) return;

  const panel = document.getElementById('thread-panel');
  if (!panel) return;

  const typeClass = conv.replyType === 'yes' ? 'badge-green' : conv.replyType === 'no' ? 'badge-red' : 'badge-gray';

  const displayName = conv.name ? esc(conv.name) : '';

  panel.innerHTML = `
    <div class="thread-header">
      <div class="thread-phone">${displayName ? `<strong>${displayName}</strong> <span style="color:var(--muted);font-weight:400;font-size:13px">${esc(phone)}</span>` : esc(phone)}</div>
      ${conv.hasReplied ? `<span class="badge ${typeClass}">${conv.replyType||'reply'}</span>` : ''}
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openConvSend('${esc(phone)}')">↗ Reply</button>
    </div>
    ${formatFlowStateLine(conv)}
    <div class="thread-messages" id="thread-msgs">
      ${conv.messages.map(m => {
        const out = m.dir === 'out';
        return `<div>
          ${out ? `<div class="msg-from" style="text-align:right">${KMC_LABELS[m.from]||m.from||''}</div>` : ''}
          <div class="msg ${out?'msg-out':'msg-in'}"
            data-id="${m.id||''}"
            data-dir="${m.dir}"
            data-phone="${esc(phone)}"
            data-text="${esc(m.text)}"
            data-type="${m.type||''}"
          >${esc(m.text)}</div>
          <div class="msg-time" style="text-align:${out?'right':'left'}">${fmtTs(m.ts)}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="quick-replies" id="quick-replies" style="display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 8px">
      <button class="btn btn-ghost btn-sm" onclick="useQuickReply('${esc(phone)}')">⚡ Use Auto-Reply Message${displayName?` for ${displayName}`:''}</button>
      <button class="btn btn-ghost btn-sm" onclick="useFollowUpReply('${esc(phone)}')">📋 Follow Up — Filled Form?${displayName?` (${displayName})`:''}</button>
      <button class="btn btn-ghost btn-sm" onclick="diagnoseAutoReply('${esc(phone)}')">🔍 Diagnose Auto-Reply</button>
    </div>
    <div class="reply-bar">
      <select id="reply-from">
        ${KMC_NUMBERS.map(n => `<option value="${n}">${KMC_LABELS[n]||n}</option>`).join('')}
      </select>
      <textarea id="reply-text" placeholder="Type a message..." rows="1" oninput="pendingIsAutoReplySend=false;this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply('${esc(phone)}')}"></textarea>
      <button class="btn btn-primary" onclick="sendReply('${esc(phone)}')">Send</button>
    </div>
  `;

  // Auto-select the KMC number used in this conversation:
  // 1st choice: from number of the last outbound message
  // 2nd choice: the KMC number that received their inbound reply (r.to)
  const lastOut = [...conv.messages].reverse().find(m => m.dir === 'out' && m.from);
  const lastIn  = [...conv.messages].reverse().find(m => m.dir === 'in'  && m.to);
  const smartFrom = lastOut?.from || lastIn?.to;
  if (smartFrom) {
    const sel = document.getElementById('reply-from');
    if (sel) sel.value = smartFrom;
  }

  // Scroll to bottom
  const msgs = document.getElementById('thread-msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function openConvSend(phone) {
  nav('send');
  setTimeout(() => {
    const to = document.getElementById('send-to');
    if (to) { to.value = phone; }
  }, 100);
}

// Generic fallback used if the contact's campaign doesn't have an auto-reply message configured
const DEFAULT_QUICK_REPLY = "Awesome, {name}! Just fill out this quick form and we'll get you a cash offer fast, no obligation, no fees: https://kmcashoffers.com/get-offer Takes 2 minutes, talk soon!";

// Follow-up for contacts who were already sent the auto-reply but haven't filled out the form yet
const DEFAULT_FOLLOWUP_MESSAGE = "Hey {name}, just checking in — were you able to fill out the quick form? Once we get that, we can call you with a cash offer that fits your needs. Here's the link again if you need it: https://kmcashoffers.com/get-offer";

// Tracks whether the text currently sitting in the reply box is the verbatim
// auto-reply template (filled in via the "Use Auto-Reply Message" button) —
// if so, sendReply() tells the backend to mark this contact's auto_replied
// flag, so the reconciliation safety net won't try to auto-send them a
// duplicate later. Any manual edit to the box, or using the Follow-Up
// template instead, clears this back to false.
let pendingIsAutoReplySend = false;

// Small display-only line for the callback-scheduling flow state, per spec
// Step 7 ("displaying flow_state and the scheduled call time on the
// conversation view — only if that's a small change"). Deliberately doesn't
// show anything for AWAITING_INTEREST (the default pre-flow state) since
// that's just "nothing has happened yet" and not worth calling out.
function formatFlowStateLine(conv) {
  const state = conv.flowState;
  if (!state || state === 'AWAITING_INTEREST') return '';
  const labels = {
    AWAITING_CALLBACK_TIME: '🕐 Awaiting callback time',
    CALL_SCHEDULED: conv.scheduledCallTimeUtc
      ? `📞 Call scheduled — ${new Date(conv.scheduledCallTimeUtc).toLocaleString('en-US', { timeZone: 'America/New_York', dateStyle: 'medium', timeStyle: 'short' })} ET`
      : '📞 Call scheduled — anytime (no specific time given)',
    OPTED_OUT: '🚫 Opted out',
    NEEDS_HUMAN: '⚠️ Needs human review',
  };
  const label = labels[state] || state;
  const needsHumanTag = conv.needsHuman ? ` <span style="color:var(--red,#e5484d)">⚠️ needs review${conv.needsHumanReason ? ' — ' + esc(conv.needsHumanReason) : ''}</span>` : '';
  return `<div style="padding:6px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border,#2a2a35)">${label}${needsHumanTag}</div>`;
}

function fillReplyBox(text) {
  const box = document.getElementById('reply-text');
  if (box) {
    box.value = text;
    box.style.height = 'auto';
    box.style.height = Math.min(box.scrollHeight, 100) + 'px';
    box.focus();
  }
}

function useQuickReply(phone) {
  const conv = inboxData.find(c => c.phone === phone);
  const template = conv?.autoReplyMessage || DEFAULT_QUICK_REPLY;
  const name = (conv?.name || '').trim();
  fillReplyBox(template.replace(/\{name\}/gi, name || 'there'));
  pendingIsAutoReplySend = true;
}

function useFollowUpReply(phone) {
  const conv = inboxData.find(c => c.phone === phone);
  const name = (conv?.name || '').trim();
  fillReplyBox(DEFAULT_FOLLOWUP_MESSAGE.replace(/\{name\}/gi, name || 'there'));
  pendingIsAutoReplySend = false;
}

// Replays the exact contact/campaign lookup the auto-reply webhook performs
// for this phone, and shows why it did or didn't fire — surfaces cases like
// a phone existing under multiple campaigns (webhook only checks the most
// recently created contact row), auto-reply toggled off, an empty auto-reply
// message, or the contact already being marked auto_replied.
async function diagnoseAutoReply(phone) {
  const r = await apiJ(`/api/debug/auto-reply/${encodeURIComponent(phone)}`);
  if (!r || !r.records) { alert('Could not run diagnosis — see console for details.'); console.log(r); return; }
  if (!r.records.length) { alert(`No kmc_contacts row found at all for ${phone} — the auto-reply webhook has nothing to look up, so it can't fire regardless of campaign settings.`); return; }
  const lines = r.records.map((rec, i) => {
    const tag = rec.wouldBePickedByWebhook ? '➡️ WEBHOOK USES THIS ONE' : '(older duplicate, ignored by webhook)';
    return [
      `Record ${i + 1} ${tag}`,
      `  Campaign: ${rec.campaign_name || '(none)'} (id: ${rec.campaign_id || 'null'})`,
      `  Created: ${rec.created_at}`,
      `  auto_reply_enabled: ${rec.auto_reply_enabled}`,
      `  auto_reply_message set: ${!!rec.auto_reply_message_preview}${rec.auto_reply_message_preview ? ' — "' + rec.auto_reply_message_preview + '..."' : ''}`,
      `  auto_replied already sent: ${rec.auto_replied}`,
      rec.blockedBecause.length ? `  ⚠️ BLOCKED: ${rec.blockedBecause.join('; ')}` : '  ✅ Nothing here would block an auto-reply',
    ].join('\n');
  });
  const inLines  = (r.inboundHistory  || []).map(m => `  [${m.type}] ${m.timestamp} — "${m.text}"`).join('\n') || '  (none)';
  const outLines = (r.outboundHistory || []).map(m => `  [${m.status}${m.campaign_id ? ' / camp ' + m.campaign_id : ''}] ${m.sent_at} — "${m.text}"`).join('\n') || '  (none)';

  alert(`Auto-reply diagnosis for ${phone}\n(${r.totalContactRecords} contact record${r.totalContactRecords>1?'s':''} found)\n\n${lines.join('\n\n')}\n\nAll-time inbound history:\n${inLines}\n\nAll-time outbound history:\n${outLines}`);
}

async function sendReply(phone) {
  const from = document.getElementById('reply-from')?.value;
  const text = document.getElementById('reply-text')?.value.trim();
  if (!from || !text) return;
  const btn = document.querySelector('.reply-bar .btn-primary');
  if (btn) btn.disabled = true;
  const markAutoReplied = pendingIsAutoReplySend;
  const r = await apiJ('/api/send', { method:'POST', body: { from, to: phone, text, markAutoReplied } });
  pendingIsAutoReplySend = false;
  if (r.ok) {
    toast('Sent ✓');
    document.getElementById('reply-text').value = '';
    await refreshInbox();
    openConv(phone);
  } else { toast(r.error || 'Send failed', 'error'); }
  if (btn) btn.disabled = false;
}

async function renderOptOuts() {

let allOptOuts = [];
async function loadOptOuts() {
  allOptOuts = await apiJ('/api/opt-outs');
  renderOptOutTable(allOptOuts);
}

function filterOptOuts(q) {
  renderOptOutTable(allOptOuts.filter(o => o.phone.includes(q) || (o.reason||'').toLowerCase().includes(q.toLowerCase())));
}

function renderOptOutTable(list) {
  const el = document.getElementById('opt-table');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div class="empty-state"><p>No opt-outs yet.</p></div>'; return; }
  el.innerHTML = `<table><thead><tr><th>Phone</th><th>Reason</th><th>Date</th><th>Action</th></tr></thead><tbody>${
    list.map(o => `<tr>
      <td style="font-weight:600">${esc(o.phone)}</td>
      <td style="color:var(--muted)">${esc(o.reason||'—')}</td>
      <td style="color:var(--muted);font-size:13px">${fmtTs(o.created_at)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="removeOptOut('${esc(o.phone)}')">Remove</button></td>
    </tr>`).join('')
  }</tbody></table>`;
}

async function addOptOut() {
  const phone  = document.getElementById('new-opt-phone').value.trim();
  const reason = document.getElementById('new-opt-reason').value.trim();
  if (!phone) { toast('Enter a phone number', 'error'); return; }
  const r = await apiJ('/api/opt-outs', { method:'POST', body: { phone, reason } });
  if (r.ok) { toast(`Blocked ${r.phone} ✓`); document.getElementById('new-opt-phone').value = ''; document.getElementById('new-opt-reason').value = ''; loadOptOuts(); }
  else toast(r.error || 'Error', 'error');
}

async function removeOptOut(phone) {
  await apiJ(`/api/opt-outs/${encodeURIComponent(phone)}`, { method:'DELETE' });
  toast('Removed from blocklist');
  loadOptOuts();
}

// ─────────────────────────────────────────────────────────────────────────────
// MANUAL SEND
// ─────────────────────────────────────────────────────────────────────────────
function renderSend() {
  const el = document.getElementById('view-send');
  el.innerHTML = `<div class="view-header"><div><div class="view-title">Manual Send</div><div class="view-sub">Send a one-off SMS from any KMC number</div></div></div>
  <div class="send-card">
    <div class="form-row">
      <label class="form-label">From Number</label>
      <select class="form-input" id="send-from">
        ${KMC_NUMBERS.map(n => `<option value="${n}">${n} — ${KMC_LABELS[n]}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">To Number</label>
      <input class="form-input" id="send-to" placeholder="+1 (555) 000-0000">
    </div>
    <div class="form-row">
      <label class="form-label">Message</label>
      <textarea class="form-input" id="send-text" rows="5" placeholder="Type your message..." oninput="document.getElementById('send-chars').textContent=this.value.length+' chars'"></textarea>
      <div class="char-count" id="send-chars">0 chars</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-primary" onclick="doManualSend()" id="send-btn">Send Message</button>
      <button class="btn btn-ghost" onclick="document.getElementById('send-text').value='';document.getElementById('send-to').value='';document.getElementById('send-chars').textContent='0 chars'">Clear</button>
    </div>
    <div id="send-result" style="margin-top:16px"></div>
  </div>`;
}

async function doManualSend() {
  const from = document.getElementById('send-from').value;
  const to   = document.getElementById('send-to').value.trim();
  const text = document.getElementById('send-text').value.trim();
  if (!to || !text) { toast('Fill in all fields', 'error'); return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Sending...';
  const r = await apiJ('/api/send', { method:'POST', body: { from, to, text } });
  btn.disabled = false; btn.textContent = 'Send Message';
  if (r.ok) {
    document.getElementById('send-result').innerHTML = `<div style="background:var(--green-dim);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:14px;font-size:14px;color:var(--green)">✅ Message sent successfully</div>`;
    toast('Sent ✓');
    document.getElementById('send-text').value = '';
    document.getElementById('send-chars').textContent = '0 chars';
  } else {
    document.getElementById('send-result').innerHTML = `<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:14px;font-size:14px;color:var(--red)">❌ ${r.error || 'Send failed (status '+r.status+')'}</div>`;
    toast(r.error || 'Send failed', 'error');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RIGHT-CLICK CONTEXT MENU
// ─────────────────────────────────────────────────────────────────────────────
let ctxTarget = null; // the message element being right-clicked

function showCtxMenu(e, el) {
  ctxTarget = el;

  const dir   = el.dataset.dir;   // 'in' or 'out'
  const id    = el.dataset.id;
  const phone = el.dataset.phone;
  const text  = el.dataset.text;
  const type  = el.dataset.type;

  // Show/hide mark options only for inbound messages
  const markSection = document.querySelectorAll('#ctx-mark-yes, #ctx-mark-no, #ctx-mark-other, #ctx-mark-yes + .ctx-divider');
  document.getElementById('ctx-mark-yes').parentElement.querySelectorAll('.ctx-item[id^="ctx-mark"]').forEach(b => {
    b.style.display = dir === 'in' ? '' : 'none';
  });
  // Highlight current type
  ['yes','no','other'].forEach(t => {
    const btn = document.getElementById('ctx-mark-' + t);
    if (btn) btn.style.fontWeight = (type === t) ? '700' : '';
  });

  // Position the menu near cursor (keep it inside viewport)
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('open');
  const mw = 220, mh = menu.offsetHeight || 280;
  let x = e.clientX, y = e.clientY;
  if (x + mw > window.innerWidth)  x = window.innerWidth  - mw - 8;
  if (y + mh > window.innerHeight) y = window.innerHeight - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
}

function closeCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('open');
  ctxTarget = null;
}

// Single delegated contextmenu listener — handles all .msg right-clicks
document.addEventListener('contextmenu', e => {
  const msgEl = e.target.closest('.msg');
  if (msgEl) {
    e.preventDefault();
    e.stopPropagation();
    showCtxMenu(e, msgEl);
  } else {
    closeCtxMenu();
  }
});
// Close on any left-click outside the menu
document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) closeCtxMenu();
});

// ── Context actions ────────────────────────────────────────────────────────────

document.getElementById('ctx-copy-msg').onclick = () => {
  if (!ctxTarget) return;
  navigator.clipboard.writeText(ctxTarget.dataset.text).then(() => toast('Message copied ✓'));
  closeCtxMenu();
};

document.getElementById('ctx-copy-phone').onclick = () => {
  if (!ctxTarget) return;
  navigator.clipboard.writeText(ctxTarget.dataset.phone).then(() => toast('Phone number copied ✓'));
  closeCtxMenu();
};

document.getElementById('ctx-mark-yes').onclick   = () => ctxReclassify('yes');
document.getElementById('ctx-mark-no').onclick    = () => ctxReclassify('no');
document.getElementById('ctx-mark-other').onclick = () => ctxReclassify('other');

async function ctxReclassify(type) {
  if (!ctxTarget || ctxTarget.dataset.dir !== 'in') return;
  const id = ctxTarget.dataset.id;
  if (!id) { toast('Cannot reclassify — no ID', 'error'); closeCtxMenu(); return; }
  await apiJ(`/api/messages/${id}/type`, { method:'PATCH', body: { type } });
  toast(`Marked as ${type.toUpperCase()} ✓`);
  closeCtxMenu();
  const phone = ctxTarget.dataset.phone;
  await refreshInbox();
  openConv(phone);
}

document.getElementById('ctx-reply-now').onclick = () => {
  if (!ctxTarget) return;
  const phone = ctxTarget.dataset.phone;
  closeCtxMenu();
  // Focus the reply textarea
  const ta = document.getElementById('reply-text');
  if (ta) { ta.focus(); return; }
  // If thread isn't open, open it
  openConv(phone);
  setTimeout(() => document.getElementById('reply-text')?.focus(), 100);
};

document.getElementById('ctx-open-send').onclick = () => {
  if (!ctxTarget) return;
  const phone = ctxTarget.dataset.phone;
  closeCtxMenu();
  nav('send');
  setTimeout(() => {
    const to = document.getElementById('send-to');
    if (to) { to.value = phone; }
    // Pre-fill from with the last KMC number used in this convo
    const conv = inboxData.find(c => c.phone === phone);
    if (conv) {
      const lastOut = [...conv.messages].reverse().find(m => m.dir === 'out' && m.from);
      const lastIn  = [...conv.messages].reverse().find(m => m.dir === 'in'  && m.to);
      const sf = lastOut?.from || lastIn?.to;
      if (sf) { const sel = document.getElementById('send-from'); if (sel) sel.value = sf; }
    }
  }, 120);
};

document.getElementById('ctx-block').onclick = async () => {
  if (!ctxTarget) return;
  const phone = ctxTarget.dataset.phone;
  if (!confirm(`Block ${phone} and add to opt-out list? They will never be texted again.`)) { closeCtxMenu(); return; }
  const r = await apiJ('/api/opt-outs', { method:'POST', body: { phone, reason: 'Blocked via inbox' } });
  closeCtxMenu();
  if (r.ok) toast(`🚫 ${phone} blocked ✓`);
  else toast(r.error || 'Error blocking', 'error');
};

document.getElementById('ctx-delete-msg').onclick = async () => {
  if (!ctxTarget) return;
  const { id, dir, phone } = ctxTarget.dataset;
  if (!id) { toast('Cannot delete — no message ID', 'error'); closeCtxMenu(); return; }
  if (!confirm('Delete this message? This cannot be undone.')) { closeCtxMenu(); return; }
  await apiJ(`/api/messages/${id}?dir=${dir}`, { method:'DELETE' });
  toast('Message deleted');
  closeCtxMenu();
  await refreshInbox();
  openConv(phone);
};

// ── Boot ──────────────────────────────────────────────────────────────────────
tryAutoLogin();
</script>
